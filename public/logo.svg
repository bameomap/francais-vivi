<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#002395"/>

  <!-- Eiffel Tower (white silhouette) -->
  <path d="M32,18 L37,28 L42,41 L53,62 L42,62 L38,51 L26,51 L22,62 L11,62 L22,41 L27,28 Z" fill="white"/>
  <!-- Leg arch gap -->
  <polygon points="26,62 29,52 35,52 38,62" fill="#002395"/>
  <!-- Horizontal bands -->
  <rect x="23.5" y="39.5" width="17" height="2.5" rx="1.25" fill="#6080c0"/>
  <rect x="28.5" y="26.5" width="7" height="2" rx="1" fill="#6080c0"/>
  <line x1="15" y1="56" x2="49" y2="56" stroke="#6080c0" stroke-width="1.2"/>

  <!-- Cat (red, sitting on tower top) -->
  <circle cx="32" cy="11" r="6" fill="#ED2939"/>
  <!-- Ears -->
  <polygon points="27.5,8.5 25,3 30,8" fill="#ED2939"/>
  <polygon points="36.5,8.5 39,3 34,8" fill="#ED2939"/>
  <!-- Inner ears -->
  <polygon points="28,8 26.5,5 30,8" fill="#ff9090"/>
  <polygon points="36,8 37.5,5 34,8" fill="#ff9090"/>
  <!-- Happy squint eyes -->
  <path d="M28.5,11.5 Q30,10 31.5,11.5" stroke="white" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M32.5,11.5 Q34,10 35.5,11.5" stroke="white" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="32" cy="13.5" rx="0.8" ry="0.6" fill="#ff9090"/>
  <!-- Whiskers -->
  <line x1="25" y1="13.5" x2="30.5" y2="13.5" stroke="white" stroke-width="0.5"/>
  <line x1="33.5" y1="13.5" x2="39" y2="13.5" stroke="white" stroke-width="0.5"/>
  <!-- Beret -->
  <ellipse cx="34" cy="6" rx="4.5" ry="1.8" fill="#001060"/>
  <circle cx="34.5" cy="4.5" r="3" fill="#001060"/>
  <circle cx="36" cy="3.5" r="0.9" fill="#ED2939"/>
</svg>
