<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivi Learns Français 🇫🇷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F5F8FF;
        -webkit-font-smoothing: antialiased;
      }
      @keyframes spin      { to { transform: rotate(360deg); } }
      @keyframes fadeUp    { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes slideUp   { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
      @keyframes slideIn   { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
      @keyframes pop       { 0%{transform:scale(0.92);opacity:0} 60%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
      @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:0.6} }
      @keyframes shimmer   { from{background-position:-200% 0} to{background-position:200% 0} }
      @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
      @keyframes minouBounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes tailWag      { 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
      .animate-fadeUp  { animation: fadeUp  0.35s ease both; }
      .animate-slideIn { animation: slideIn 0.3s ease both; }
      .animate-pop     { animation: pop     0.3s ease both; }
      * { -webkit-tap-highlight-color: transparent; }
      /* Desktop layout */
      @media (min-width: 640px) {
        .app-shell { max-width: 680px; margin: 0 auto; }
        .module-grid { grid-template-columns: 1fr 1fr 1fr !important; }
      }
      @media (min-width: 1024px) {
        body { background: #E8EFFF; }
        .app-shell { box-shadow: 0 0 60px rgba(74,144,217,0.12); border-radius: 24px; overflow: hidden; }
        .module-grid { grid-template-columns: 1fr 1fr 1fr 1fr !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
